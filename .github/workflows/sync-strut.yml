name: Sync strut skill from source

on:
  schedule:
    - cron: '42 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  SOURCE_REPO: gfargo/strut
  SOURCE_SKILL_PATH: .kiro/skills/strut
  DEST_SKILL_PATH: plugins/devops/skills/strut
  PLUGIN_JSON: plugins/devops/.claude-plugin/plugin.json
  MARKETPLACE_JSON: .claude-plugin/marketplace.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest strut release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api "repos/${SOURCE_REPO}/releases/latest" --jq '.tag_name')
          current=$(cat "${DEST_SKILL_PATH}/.source-version" 2>/dev/null || echo "none")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" = "$current" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch source at latest tag
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git clone --depth 1 --branch "${{ steps.check.outputs.latest }}" \
            "https://github.com/${SOURCE_REPO}.git" /tmp/source

      - name: Mirror skill content
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          rsync -a --delete "/tmp/source/${SOURCE_SKILL_PATH}/" "${DEST_SKILL_PATH}/"
          echo "${{ steps.check.outputs.latest }}" > "${DEST_SKILL_PATH}/.source-version"

      - name: Bump devops plugin version
        if: steps.check.outputs.up_to_date == 'false'
        id: bump
        run: |
          old=$(jq -r '.version' "${PLUGIN_JSON}")
          IFS='.' read -r major minor patch <<< "$old"
          new="${major}.${minor}.$((patch + 1))"
          sed -i "s/\"version\": \"${old}\"/\"version\": \"${new}\"/" "${PLUGIN_JSON}"
          sed -i "s/\"version\": \"${old}\"/\"version\": \"${new}\"/" "${MARKETPLACE_JSON}"
          echo "new_version=$new" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST_SKILL_PATH}" "${PLUGIN_JSON}" "${MARKETPLACE_JSON}"
          git commit -m "sync: strut ${{ steps.check.outputs.latest }} (devops v${{ steps.bump.outputs.new_version }})"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Create release
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "devops v${{ steps.bump.outputs.new_version }} — strut ${{ steps.check.outputs.latest }}" \
            --notes "Synced devops:strut to [gfargo/strut@${{ steps.check.outputs.latest }}](https://github.com/${SOURCE_REPO}/releases/tag/${{ steps.check.outputs.latest }})"
